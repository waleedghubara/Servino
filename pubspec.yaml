        - asset: assets/fonts/BOOTERFF.ttf
    - family: MAXIGO
      fonts:
        - asset: assets/fonts/MAXIGO.ttf
    - family: Terminal
      fonts:
        - asset: assets/fonts/Terminal.TTF
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Medium.ttf
    - family: XBFont_ENG
      fonts:
        - asset: assets/fonts/XBFont_ENG.ttf
    - family: XBFont-Medium
      fonts:
        - asset: assets/fonts/XBFont-Medium.ttf
    - family: XBFont4
      fonts:
        - asset: assets/fonts/XBFont4.ttf
    - family: XBFont6
      fonts:
        - asset: assets/fonts/XBFont6.ttf
    - family: XBFontEng2
      fonts:
        - asset: assets/fonts/XBFontEng2.ttf