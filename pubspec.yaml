  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true

  assets:
    - assets/images/app_logo.png
    - assets/images/
    - assets/lang/
    - assets/fonts/
    - assets/icons/
    - assets/json/


  fonts:
    - family: BOOTERFF
